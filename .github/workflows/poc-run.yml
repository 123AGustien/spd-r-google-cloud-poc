name: SPD-R Reproducible CI (Industry Grade)

on:
  workflow_dispatch:
  push:
    branches:
      - main

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  validate:
    runs-on: ubuntu-22.04   # 🔒 NO DRIFT

    steps:

      # ---------------------------------
      # 1. Identity / traceability
      # ---------------------------------
      - name: CI Identity
        run: |
          echo "SPD-R REPRODUCIBLE CI"
          echo "Commit: $GITHUB_SHA"

      # ---------------------------------
      # 2. Checkout EXACT commit
      # ---------------------------------
      - name: Checkout
        uses: actions/checkout@v4

      # ---------------------------------
      # 3. Setup Python (fixed version)
      # ---------------------------------
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      # ---------------------------------
      # 4. Install dependencies (if any)
      # ---------------------------------
      - name: Install dependencies
        run: |
          if [ -f requirements.txt ]; then
            pip install -r requirements.txt
          else
            echo "No dependencies"
          fi

      # ---------------------------------
      # 5. Execute deterministic system
      # ---------------------------------
      - name: Run system
        run: |
          set -e
          FILE=$(find . -name "system_cli_runner.py" | head -n 1)
          python "$FILE"

      # ---------------------------------
      # 6. Validate output existence
      # ---------------------------------
      - name: Validate output
        run: |
          test -f system_result.json

      # ---------------------------------
      # 7. Deterministic validation gate
      # ---------------------------------
      - name: Resilience Gate
        run: |
          python - << 'EOF'
          import json, sys

          with open("system_result.json") as f:
              data = json.load(f)

          srs = data.get("fusion", {}).get("SRS")

          print("SRS:", srs)

          if srs is None:
              sys.exit(1)

          if srs < 0:
              sys.exit(1)

          print("PASS")
          EOF

      # ---------------------------------
      # 8. Artifact (immutable trace)
      # ---------------------------------
      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: spd-r-run-${{ github.sha }}
          path: system_result.json
