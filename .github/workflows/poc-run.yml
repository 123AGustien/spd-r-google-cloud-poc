name: Batch Simulation + Resilience CI (Auto Snapshot)

on:
  workflow_dispatch:
  push:
    branches:
      - main

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  resilience-validation:
    runs-on: ubuntu-latest

    steps:

      # ---------------------------------
      # 1. Context Banner
      # ---------------------------------
      - name: CI Context Banner
        run: |
          echo "=============================="
          echo "SPD-R CI SNAPSHOT PIPELINE"
          echo "=============================="

      # ---------------------------------
      # 2. Checkout
      # ---------------------------------
      - name: Checkout repository
        uses: actions/checkout@v4

      # ---------------------------------
      # 3. Setup Python
      # ---------------------------------
      - name: Set up Python environment
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      # ---------------------------------
      # 4. Run System
      # ---------------------------------
      - name: Run SPD-R System (Safe Execution)
        run: |
          set -e

          FILE=$(find . -name "system_cli_runner.py" | head -n 1)

          if [ -z "$FILE" ]; then
            echo "❌ CLI runner not found"
            exit 1
          fi

          python "$FILE"

      # ---------------------------------
      # 5. Validate Output
      # ---------------------------------
      - name: Validate output
        run: |
          test -f system_result.json

      # ---------------------------------
      # 6. Resilience Gate
      # ---------------------------------
      - name: SRS Gate
        run: |
          python - << 'EOF'
          import json, sys

          data = json.load(open("system_result.json"))
          srs = data.get("fusion", {}).get("SRS")

          if srs is None or srs < 0:
              print("FAIL")
              sys.exit(1)

          print("PASS")
          EOF

      # ---------------------------------
      # 7. Upload Artifact
      # ---------------------------------
      - name: Upload results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: spd-r-ci-results
          path: system_result.json

      # ---------------------------------
      # 8. AUTO CI TAGGING
      # ---------------------------------
      - name: Auto Tag CI Snapshot
        if: success()
        run: |
          set -e

          TAG="ci-v1.1.0-$(date +%Y%m%d-%H%M%S)"

          git config user.name "spd-r-bot"
          git config user.email "spd-r-bot@users.noreply.github.com"

          git tag -a "$TAG" -m "CI snapshot"

          git push origin "$TAG"

          echo "Tagged: $TAG"
