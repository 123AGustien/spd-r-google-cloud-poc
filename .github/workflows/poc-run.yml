name: Batch Simulation + Resilience CI

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  resilience-validation:
    runs-on: ubuntu-latest

    steps:
      # -----------------------------
      # 1. Checkout
      # -----------------------------
      - name: Checkout repository
        uses: actions/checkout@v4

      # -----------------------------
      # 2. Setup Python
      # -----------------------------
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      # -----------------------------
      # 3. Run Unified System Runner
      # -----------------------------
      - name: Run System CLI Runner (Single Source of Truth)
        run: python system_cli_runner.py

      # -----------------------------
      # 4. Resilience Gate
      # -----------------------------
      - name: Resilience Threshold Gate
        run: |
          python - << 'EOF'
          import json
          import sys

          with open("system_result.json", "r") as f:
              data = json.load(f)

          mean_srs = data["fusion"]["SRS"]

          print("\n=== RESILIENCE GATE ===")
          print("Mean SRS:", mean_srs)

          THRESHOLD = 0.2

          if mean_srs < THRESHOLD:
              print("❌ SYSTEM FAILURE: Resilience below threshold")
              sys.exit(1)
          else:
              print("✅ SYSTEM STABLE")
              sys.exit(0)
          EOF

      # -----------------------------
      # 5. Upload Artifacts
      # -----------------------------
      - name: Upload Results
        uses: actions/upload-artifact@v4
        with:
          name: system-resilience-results
          path: system_result.json
