name: Batch Simulation + Resilience CI

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  resilience-validation:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python environment
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Debug repo structure
        run: ls -R

      - name: Run SPD-R System CLI Runner
        run: |
          if [ -f system_cli_runner.py ]; then
            python system_cli_runner.py
          else
            echo "❌ system_cli_runner.py NOT FOUND"
            exit 1
          fi

      - name: Resilience Threshold Gate
        run: |
          python - << 'EOF'
          import json, sys

          try:
              with open("system_result.json", "r") as f:
                  data = json.load(f)
          except FileNotFoundError:
              print("❌ system_result.json not found")
              sys.exit(1)

          srs = data.get("fusion", {}).get("SRS")

          print("\n=== SPD-R RESILIENCE GATE ===")
          print(f"SRS Value: {srs}")

          if srs is None:
              print("❌ Missing SRS")
              sys.exit(1)

          THRESHOLD = 0.2

          if srs < THRESHOLD:
              print("❌ SYSTEM FAILURE")
              sys.exit(1)

          print("✅ SYSTEM STABLE")
          EOF

      - name: Upload Simulation Results
        uses: actions/upload-artifact@v4
        with:
          name: spd-r-resilience-results
          path: system_result.json
