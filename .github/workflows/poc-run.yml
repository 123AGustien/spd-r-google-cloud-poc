name: Batch Simulation + Resilience CI (Self-Healing + Auto-Tag)

on:
  workflow_dispatch:
  push:
    branches:
      - main

# ---------------------------------
# REQUIRED: allow tagging
# ---------------------------------
permissions:
  contents: write

# ---------------------------------
# Global environment
# ---------------------------------
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  resilience-validation:
    runs-on: ubuntu-latest

    steps:

      # ---------------------------------
      # 1. CI Context Banner
      # ---------------------------------
      - name: CI Context Banner
        run: |
          echo "=============================="
          echo "SPD-R Resilience CI Running"
          echo "=============================="

      # ---------------------------------
      # 2. Checkout repository
      # ---------------------------------
      - name: Checkout repository
        uses: actions/checkout@v4

      # ---------------------------------
      # 3. Setup Python
      # ---------------------------------
      - name: Set up Python environment
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      # ---------------------------------
      # 4. Repository structure
      # ---------------------------------
      - name: Show repository structure
        run: |
          echo "📂 Repository structure:"
          ls -R

      # ---------------------------------
      # 5. Safe CLI execution
      # ---------------------------------
      - name: Run SPD-R System (Safe Execution)
        run: |
          set -e

          echo "🔍 Searching for system_cli_runner.py..."

          FILE=$(find . -name "system_cli_runner.py" | head -n 1)

          if [ -z "$FILE" ]; then
            echo "❌ ERROR: CLI runner not found"
            ls -R
            exit 1
          fi

          echo "✅ Found CLI Runner: $FILE"
          python "$FILE"

      # ---------------------------------
      # 6. Output validation
      # ---------------------------------
      - name: Validate system output file
        run: |
          if [ ! -f system_result.json ]; then
            echo "❌ system_result.json missing"
            exit 1
          fi

          echo "✅ Output file exists"

      # ---------------------------------
      # 7. Resilience Gate (SRS check)
      # ---------------------------------
      - name: Resilience Threshold Gate (SRS Check)
        run: |
          python - << 'EOF'
          import json, sys

          try:
              with open("system_result.json", "r") as f:
                  data = json.load(f)
          except Exception as e:
              print("❌ Failed to load system_result.json:", e)
              sys.exit(1)

          srs = data.get("fusion", {}).get("SRS")

          print("\n=== SPD-R RESILIENCE GATE ===")
          print(f"SRS Value: {srs}")

          if srs is None:
              print("❌ Missing SRS value")
              sys.exit(1)

          THRESHOLD = 0.0

          if srs < THRESHOLD:
              print("❌ SYSTEM FAILURE: Below resilience threshold")
              sys.exit(1)

          print("✅ SYSTEM STABLE: Resilience OK")
          EOF

      # ---------------------------------
      # 8. Runtime snapshot
      # ---------------------------------
      - name: Runtime Snapshot
        run: |
          python --version
          uname -a

      # ---------------------------------
      # 9. Upload artifacts (always safe)
      # ---------------------------------
      - name: Upload Simulation Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: spd-r-resilience-results
          path: system_result.json

      # ---------------------------------
      # 10. Auto Tag (ONLY on success)
      # ---------------------------------
      - name: Auto Tag Release (Self-Versioning)
        if: success()
        run: |
          set -e

          echo "🔖 Auto-tagging successful CI run..."

          TAG="v1.1.0-auto-$(date +%Y%m%d-%H%M%S)"

          echo "Generated tag: $TAG"

          git config user.name "spd-r-bot"
          git config user.email "spd-r-bot@users.noreply.github.com"

          git tag -a "$TAG" -m "Auto-tag: successful SPD-R resilience CI run"

          git push origin "$TAG"

          echo "✅ Tag pushed successfully: $TAG"
