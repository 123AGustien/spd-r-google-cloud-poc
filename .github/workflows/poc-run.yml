name: Batch Simulation + Resilience CI

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  run-simulation:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Run batch simulation engine
        run: python batch_simulation_engine.py

      - name: Compute resilience statistics
        run: python SYSTEM_RESILIENCE_STATISTICS_ENGINE.py

      - name: Run CLI system integrity check
        run: python system_cli_runner.py

      - name: Upload batch results
        uses: actions/upload-artifact@v4
        with:
          name: batch-simulation-results
          path: |
            batch_results.json
            system_result.json
